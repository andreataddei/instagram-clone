name: instagram_clone
description: Clone di Instagram sviluppato con Flutter e Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Supabase
  supabase_flutter: ^2.3.0

  # UI
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  go_router: ^13.0.0
  flutter_spinkit: ^5.2.0
  timeago: ^3.5.0
  intl: ^0.18.1

  # Media
  image_picker: ^1.0.4
  image_cropper: ^5.0.1
  video_player: ^2.8.0
  image: ^4.1.3

  # Storage
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^8.0.0

  # Social
  share_plus: ^7.2.0
  url_launcher: ^6.1.14

  # Platform
  permission_handler: ^11.1.0
  device_info_plus: ^9.0.3

  # Icons
  cupertino_icons: ^1.0.6

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/
    - assets/translations/

  fonts:
    - family: SFProDisplay
      fonts:
        - asset: assets/fonts/SF-Pro-Display.ttf
